<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" className="w-full h-full">
  <defs>
    <!-- 主背景渐变 -->
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2fe;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#bae6fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7dd3fc;stop-opacity:1" />
    </linearGradient>
    
    <!-- 地面渐变 -->
    <linearGradient id="ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#86efac;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ade80;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 天空背景 -->
  <rect fill="url(#sky)" width="1440" height="900"/>
  
  <!-- 远景山脉（简洁线条） -->
  <path d="M0 500 Q200 350 400 450 Q600 380 800 420 Q1000 350 1200 400 Q1400 360 1440 400 L1440 900 L0 900 Z" 
        fill="#d1fae5" opacity="0.6"/>
  <path d="M0 550 Q300 420 600 500 Q900 440 1200 480 Q1350 450 1440 470 L1440 900 L0 900 Z" 
        fill="#a7f3d0" opacity="0.5"/>
  
  <!-- 地面 -->
  <rect y="600" width="1440" height="300" fill="url(#ground)" opacity="0.4"/>
  
  <!-- 简洁云朵 -->
  <g fill="white" opacity="0.7">
    <ellipse cx="200" cy="150" rx="80" ry="35"/>
    <ellipse cx="240" cy="140" rx="60" ry="30"/>
    <ellipse cx="160" cy="145" rx="50" ry="25"/>
    
    <ellipse cx="800" cy="200" rx="100" ry="40"/>
    <ellipse cx="860" cy="185" rx="70" ry="35"/>
    <ellipse cx="750" cy="195" rx="55" ry="28"/>
    
    <ellipse cx="1200" cy="120" rx="90" ry="38"/>
    <ellipse cx="1250" cy="105" rx="65" ry="32"/>
    <ellipse cx="1150" cy="115" rx="50" ry="25"/>
  </g>
  
  <!-- 少量装饰性棋子图案（点缀，不喧宾夺主） -->
  <g opacity="0.15">
    <circle cx="100" cy="400" r="20" fill="#1f2937"/>
    <circle cx="1300" cy="350" r="18" fill="#fafafa" stroke="#1f2937" stroke-width="2"/>
    <circle cx="1350" cy="380" r="15" fill="#1f2937"/>
  </g>
</svg>
