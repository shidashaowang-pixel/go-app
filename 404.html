<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    (function() {
      var path = window.location.pathname;
      var search = window.location.search;
      path = path.replace(/\/$/, '');
      window.location.replace('/go-app/' + path + search);
    })();
  </script>
</head>
<body>
</body>
</html>
